
        <!DOCTYPE html>
        <html>
        <head>
            <title>Matrix Core Timer Dashboard</title>
            <style>
                body {
                    background: #0d1117;
                    color: #c9d1d9;
                    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    height: 100vh;
                    margin: 0;
                }
                .dashboard-container {
                    background: #161b22;
                    border: 1px solid #30363d;
                    border-radius: 24px;
                    padding: 50px;
                    text-align: center;
                    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
                    width: 380px;
                }
                .logo-header {
                    font-size: 14px;
                    font-weight: 800;
                    letter-spacing: 4px;
                    color: #8b949e;
                    text-transform: uppercase;
                    margin-bottom: 30px;
                }
                .state-pill {
                    display: inline-block;
                    padding: 6px 16px;
                    border-radius: 20px;
                    font-size: 13px;
                    font-weight: 600;
                    letter-spacing: 1px;
                    background: rgba(255,255,255,0.05);
                    color: #7ee787;
                    border: 1px solid #7ee787;
                    text-transform: uppercase;
                    margin-bottom: 20px;
                }
                .clock-face {
                    font-size: 76px;
                    font-weight: 700;
                    font-family: monospace;
                    color: #ffffff;
                    margin: 10px 0 30px 0;
                    text-shadow: 0 0 20px rgba(255,255,255,0.1);
                }
                .meter-track {
                    background: #21262d;
                    border-radius: 10px;
                    width: 100%;
                    height: 6px;
                    overflow: hidden;
                    margin-bottom: 25px;
                }
                .meter-fill {
                    background: #7ee787;
                    width: 100%;
                    height: 100%;
                    transition: width 1s linear;
                }
                .analytics-row {
                    display: flex;
                    justify-content: space-around;
                    border-top: 1px solid #21262d;
                    padding-top: 20px;
                    margin-top: 10px;
                }
                .stat-box { text-align: center; }
                .stat-val { font-size: 18px; font-weight: bold; color: #f0f6fc; }
                .stat-lbl { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-top: 4px; }
            </style>
        </head>
        <body>
            <div class="dashboard-container">
                <div class="logo-header">Vaani Chronos v2</div>
                <div class="state-pill" id="state-label">Long Break</div>
                <div class="clock-face" id="clock">00:00</div>
                
                <div class="meter-track">
                    <div class="meter-fill" id="meter"></div>
                </div>

                <div class="analytics-row">
                    <div class="stat-box">
                        <div class="stat-val" id="target-stat">25 minutes</div>
                        <div class="stat-lbl">Target</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="cycle-stat">#1</div>
                        <div class="stat-lbl">Session Round</div>
                    </div>
                </div>
            </div>

            <script>
                let timeRemaining = 1500;
                const totalDuration = 1500;
                let currentMode = "long_break";
                
                const clock = document.getElementById('clock');
                const meter = document.getElementById('meter');
                const stateLabel = document.getElementById('state-label');
                const targetStat = document.getElementById('target-stat');
                const cycleStat = document.getElementById('cycle-stat');
                
                let sessionCount = 1;

                function tick() {
                    let mins = Math.floor(timeRemaining / 60);
                    let secs = timeRemaining % 60;
                    clock.textContent = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
                    
                    let ratio = (timeRemaining / totalDuration) * 100;
                    meter.style.width = ratio + '%';

                    if (timeRemaining <= 0) {
                        // Execute Audio Matrix Alert
                        let audio = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");
                        audio.play();
                        
                        // Automated Pomodoro State Transition Tree Logic
                        if (currentMode === "work") {
                            // Shift to break cycles automatically
                            sessionCount++;
                            currentMode = "short_break";
                            stateLabel.textContent = "Short Break";
                            stateLabel.style.color = "#58a6ff";
                            stateLabel.style.borderColor = "#58a6ff";
                            meter.style.background = "#58a6ff";
                            timeRemaining = 5 * 60; // 5 min default short rest loop
                            targetStat.textContent = "5 Min";
                            cycleStat.textContent = "#" + sessionCount;
                        } else {
                            // Recycle directly back to work matrix block
                            currentMode = "work";
                            stateLabel.textContent = "Focus Session";
                            stateLabel.style.color = "#f0883e";
                            stateLabel.style.borderColor = "#f0883e";
                            meter.style.background = "#f0883e";
                            timeRemaining = 25 * 60; // Recycles right back into optimal 25m loop
                            targetStat.textContent = "25 Min";
                        }
                        // Reset the baseline dynamic ceiling marker parameter
                        return;
                    }
                    timeRemaining--;
                }

                setInterval(tick, 1000);
                tick();
            </script>
        </body>
        </html>
