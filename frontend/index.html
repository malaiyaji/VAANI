    <style>
        body {
            background-color: #060606;
            color: #e5e2e1;
            overflow-x: hidden;
        }
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.015), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.015));
            background-size: 100% 3px, 4px 100%;
            pointer-events: none; z-index: 50; opacity: 0.4;
        }
        .noise-texture {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.07; pointer-events: none; z-index: 40;
            filter: contrast(140%) brightness(90%);
        }
        .chromatic-glow {
            text-shadow: -2px 0 rgba(255, 82, 92, 0.5), 2px 0 rgba(0, 242, 254, 0.3);
            animation: jitter 6s infinite ease-in-out;
        }
        @keyframes jitter {
            0%, 48%, 52%, 100% { transform: translate(0,0); }
            49% { transform: translate(0.8px, -0.4px); }
            51% { transform: translate(-0.8px, 0.4px); }
        }
        .glass-panel {
            background: rgba(14, 14, 14, 0.45);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 24px 64px -16px rgba(0, 0, 0, 0.7);
        }
        .signal-glow {
            box-shadow: 0 0 32px -4px rgba(255, 82, 92, 0.4);
        }
        .scanline {
            width: 100%; height: 120px; z-index: 45;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.03) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.08; position: absolute; bottom: 100%;
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -120px; }
        }
        .hero-text {
            letter-spacing: -0.04em;
            line-height: 1.05;
        }
    </style>
</head>
<body class="font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col justify-between relative">

<div class="crt-overlay"></div>

<!-- Ambient Blurred Background Shield -->
<div class="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat transition-opacity duration-1000 scale-105 blur-[3px]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDZ9Q6NfBAsFo4yz2EqsiLxj63AIGkLf00LsNxG-etiu3-Q1-gD7prTXwjKUUKmP_WTOt_EB7MCopQosaD47z_rpQIm3AUoGjn2GPh0pQGtSTorxAIzcvsFEbTKkN1u_hpc6A6UQDgPPsAT--DFFaRe9BVzqjs3mu2v93O45tUJ6TkA5qSGathT_EFugHtiBFsLJ29z1TAHEEw7yp9BAQ91yop9c_FHnzZZXzFp19TD-G4qZ4IkmDkFM-oZ6nUtglU68m4');">
    <div class="absolute inset-0 bg-black/75 backdrop-brightness-50"></div>
</div>

<header class="fixed top-0 left-0 w-full z-50 border-b border-white/[0.02] bg-black/10 backdrop-blur-md">
    <div class="flex justify-between items-center w-full px-margin py-5 max-w-container-max-width mx-auto">
        <div class="text-headline-lg font-headline-lg font-black text-on-surface uppercase tracking-tighter cursor-pointer hover:text-primary transition-colors duration-300">
            VAANI
        </div>
        <div class="font-label-sm text-[10px] tracking-[0.3em] font-bold text-primary/80 bg-primary-container/10 px-3 py-1 border border-primary/20 rounded-md">
            CORE_GRID // ONLINE
        </div>
    </div>
</header>

<main class="relative z-10 flex flex-col items-center justify-center flex-grow w-full px-margin pt-32 pb-16">
    <div class="max-w-4xl w-full mx-auto">
        <div class="glass-panel rounded-xl p-8 md:p-16 text-center relative overflow-hidden group transition-all duration-500 hover:border-white/10">
            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/40 to-transparent"></div>
            
            <div class="relative z-20 flex flex-col items-center">
                
                <!-- Status Header Block -->
                <div class="flex flex-col items-center gap-2 mb-10">
                    <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-neutral-900/60 border border-white/5 rounded-full backdrop-blur-sm">
                        <span id="status-pulse" class="w-2 h-2 rounded-full bg-primary-container animate-pulse shadow-[0_0_12px_rgba(255,82,92,0.8)]"></span>
                        <span id="status" class="font-label-sm text-[11px] uppercase tracking-[0.2em] text-primary/90 font-semibold">System Interface Idle</span>
                    </div>
                    <div id="db-status-banner" class="font-label-sm text-[9px] tracking-[0.25em] opacity-40 text-center uppercase">
                        CROSS_GRID_ROUTING: VECTOR INTEL STANDBY...
                    </div>
                </div>
                
                <!-- Main Communication Area Context -->
                <div class="min-h-[160px] flex items-center justify-center w-full max-w-2xl mb-8">
                    <h1 id="main-display-text" class="font-display-lg text-4xl md:text-5xl hero-text uppercase font-extrabold tracking-tight chromatic-glow text-on-surface transition-all duration-500">
                        Say your <br/><span class="text-primary italic font-light">issue here</span>
                    </h1>
                </div>
                
                <!-- 🛰️ Intel Operational Dashboard Metrics Matrix -->
                <div id="intel-matrix" class="hidden grid grid-cols-2 gap-x-8 gap-y-3.5 text-left font-label-sm text-[11px] border-t border-b border-white/[0.06] py-5 my-6 w-full max-w-md tracking-widest bg-black/20 p-4 rounded-lg">
                    <div class="flex flex-col gap-0.5"><span class="opacity-30 text-[9px] font-bold">JOB ENGINE</span> <span id="readout-job" class="text-primary font-bold text-xs">--</span></div>
                    <div class="flex flex-col gap-0.5"><span class="opacity-30 text-[9px] font-bold">CLASSIFICATION</span> <span id="readout-type" class="text-white/90 font-bold text-xs">--</span></div>
                    <div class="flex flex-col gap-0.5"><span class="opacity-30 text-[9px] font-bold">SECTOR DOMAIN</span> <span id="readout-sector" class="text-white/90 font-bold text-xs">--</span></div>
                    <div class="flex flex-col gap-0.5"><span class="opacity-30 text-[9px] font-bold">DISPATCH TARGET</span> <span id="readout-resource" class="text-emerald-400 font-bold text-xs">--</span></div>
                </div>
                
                <!-- 📡 Automated Pipeline Response Display Alert Card -->
                <div id="dispatch-alert-card" class="hidden w-full max-w-md p-4 rounded-lg text-left font-label-sm space-y-2 mt-2 transition-all duration-300">
                    <div id="dispatch-title" class="flex items-center gap-2 font-bold tracking-widest uppercase text-[11px]"></div>
                    <p id="dispatch-action-text" class="text-white/80 font-body-md text-sm leading-relaxed">--</p>
                </div>

                <!-- Capture Peripheral Interface Controls -->
                <div class="pt-10 flex flex-col items-center">
                    <button id="record-btn" onclick="toggleRecording()" class="w-24 h-24 rounded-full border border-white/10 bg-white/[0.02] hover:bg-white/[0.06] hover:border-primary/40 text-on-surface flex flex-col items-center justify-center gap-1.5 transition-all duration-300 active:scale-95 group shadow-2xl cursor-pointer relative">
                        <span class="absolute inset-0 rounded-full bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span>
                        <span id="record-icon" class="material-symbols-outlined text-3xl text-primary transition-transform duration-300 group-hover:scale-110">mic</span>
                        <span id="record-text" class="font-label-sm text-[9px] uppercase tracking-[0.2em] font-bold opacity-50">Record</span>
                    </button>
                </div>
                
                <div class="mt-12 h-[1px] w-24 bg-gradient-to-r from-transparent via-primary/40 to-transparent signal-glow"></div>
            </div>
        </div>
    </div>
</main>

<footer class="w-full py-4 text-center font-label-sm text-[9px] tracking-[0.3em] opacity-30 border-t border-white/[0.01] bg-black/20 relative z-10">
    VAANI OPERATIONAL NEURAL DATA INTERFACE LAYER v4.9.2
</footer>

<script>
    // Premium Mouse Parallax Interactive System Matrix
    document.addEventListener('mousemove', (e) => {
        const moveX = (e.clientX - window.innerWidth / 2) / 90;
        const moveY = (e.clientY - window.innerHeight / 2) / 90;
        const panel = document.querySelector('.glass-panel');
        const bg = document.querySelector('.fixed.inset-0.z-0');
        if(panel) panel.style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;
        if(bg) bg.style.transform = `scale(1.05) translate3d(${moveX * -0.4}px, ${moveY * -0.4}px, 0)`;
    });

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    // Backend Connection Base Path Configuration
    const DEPLOYED_BACKEND_URL = "https://vaani-m25h.onrender.com";

    async function toggleRecording() {
        const recordBtn = document.getElementById("record-btn");
        const recordIcon = document.getElementById("record-icon");
        const recordText = document.getElementById("record-text");
        const statusPulse = document.getElementById("status-pulse");
        const statusText = document.getElementById("status");

        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    statusText.innerText = "Processing Voice Protocol via AI Core...";
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await processCrisisPipeline(audioBlob);
                };

                mediaRecorder.start();
                isRecording = true;

                recordBtn.classList.add("border-red-500/40", "bg-red-950/20");
                recordIcon.innerText = "stop";
                recordIcon.className = "material-symbols-outlined text-3xl text-red-400 animate-pulse";
                recordText.innerText = "Stop";
                statusPulse.className = "w-2 h-2 rounded-full bg-red-500 animate-ping";
                statusText.innerText = "Streaming live audio packets...";
                statusText.className = "font-label-sm text-[11px] uppercase tracking-[0.2em] text-red-400 font-bold";

            } catch (err) {
                console.error("Audio pipeline crash:", err);
                statusText.innerText = "MIC CAPTURE MALFUNCTION";
                statusText.className = "font-label-sm text-[11px] uppercase tracking-[0.2em] text-red-500 font-bold";
            }
        } else {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            isRecording = false;

            recordBtn.classList.remove("border-red-500/40", "bg-red-950/20");
            recordIcon.innerText = "mic";
            recordIcon.className = "material-symbols-outlined text-3xl text-primary transition-transform duration-300 group-hover:scale-110";
            recordText.innerText = "Record";
        }
    }

    async function processCrisisPipeline(blob) {
        const statusText = document.getElementById("status");
        const statusPulse = document.getElementById("status-pulse");
        const formData = new FormData();
        formData.append("file", blob, "live_capture.webm");

        try {
            const response = await fetch(`${DEPLOYED_BACKEND_URL}/api/voice-incident`, {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error("Server transmission degraded");

            const data = await response.json();
            executeUIRouting(data);

        } catch (error) {
            console.warn("Pipeline fault captured. Activating backup local routing...", error);
            
            const fallbackData = {
                "job_id": "SYS-LOCAL",
                "transcript": "Pinterest fallback routing activated via safety framework.",
                "incident_type": "BACKUP_GRID_SEARCH",
                "sector": "VISUAL_GRID",
                "allocated_resource": "PINTEREST_ROUTER",
                "routing": {
                    "target_app": "pinterest",
                    "extracted_params": { "query": "cyberpunk fashion design" }
                }
            };
            
            statusText.innerText = "LOCAL SAFEGUARD DISPATCH ENGAGED";
            statusText.className = "font-label-sm text-[11px] uppercase tracking-[0.2em] text-amber-400 font-bold";
            statusPulse.className = "w-2 h-2 rounded-full bg-amber-400 animate-pulse shadow-[0_0_12px_rgba(251,191,36,0.8)]";
            
            executeUIRouting(fallbackData);
        }
    }

    function executeUIRouting(data) {
        const mainDisplay = document.getElementById("main-display-text");
        const intelMatrix = document.getElementById("intel-matrix");
        const dispatchCard = document.getElementById("dispatch-alert-card");
        const dispatchTitle = document.getElementById("dispatch-title");
        const dispatchText = document.getElementById("dispatch-action-text");
        const transcript = data.transcript;

        mainDisplay.innerHTML = `<span class="text-[10px] block tracking-[0.3em] text-primary/60 font-label-sm uppercase mb-3 font-bold">TRANSCRIPT CAPTURED</span> <span class="font-body-md text-white/90 normal-case text-xl md:text-2xl font-medium leading-relaxed">"${transcript}"</span>`;

        document.getElementById("readout-job").innerText = data.job_id || "--";
        document.getElementById("readout-type").innerText = data.incident_type || "--";
        document.getElementById("readout-sector").innerText = data.sector || "--";
        document.getElementById("readout-resource").innerText = data.allocated_resource || "--";
        
        intelMatrix.classList.remove("hidden");
        intelMatrix.classList.add("grid");

        const routing = data.routing;
        if (!routing) return;
        
        const appType = routing.target_app ? routing.target_app.toLowerCase() : "";
        const params = routing.extracted_params || {};
        let targetUrl = "";

        // Reset visibility classes cleanly
        dispatchCard.className = "w-full max-w-md p-5 rounded-lg text-left font-label-sm space-y-2 mt-4 block border bg-neutral-900/40 backdrop-blur-md animate-pulse shadow-lg";
        const cleanAppType = appType.trim().toLowerCase();

        switch(cleanAppType) {
            case "pinterest":
                dispatchCard.classList.add("border-red-500/30", "shadow-red-950/20");
                dispatchTitle.className = "text-red-400 font-bold tracking-[0.2em] uppercase text-[11px] flex items-center gap-1.5";
                dispatchTitle.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-400"></span> PINTEREST VISUAL MATRIX`;
                targetUrl = `https://in.pinterest.com/search/pins/?q=${encodeURIComponent(params.query || transcript)}`;
                dispatchText.innerText = `Sourcing creative style variables and mapping active visual panels...`;
                break;
            case "youtube":
                dispatchCard.classList.add("border-red-500/30", "shadow-red-950/20");
                dispatchTitle.className = "text-red-400 font-bold tracking-[0.2em] uppercase text-[11px] flex items-center gap-1.5";
                dispatchTitle.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-400"></span> YOUTUBE STREAM ENGINE`;
                targetUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(params.query || transcript)}`;
                dispatchText.innerText = `Routing parameter queries directly to global media index channels...`;
                break;
            case "spotify":
                dispatchCard.classList.add("border-emerald-500/30", "shadow-emerald-950/20");
                dispatchTitle.className = "text-emerald-400 font-bold tracking-[0.2em] uppercase text-[11px] flex items-center gap-1.5";
                dispatchTitle.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> SPOTIFY ACOUSTIC CHANNELS`;
                targetUrl = `https://open.spotify.com/search/${encodeURIComponent(params.query || transcript)}/tracks`;
                dispatchText.innerText = `Initializing track stream query pathways...`;
                break;
            default:
                dispatchCard.classList.add("border-neutral-500/30", "shadow-black/40");
                dispatchTitle.className = "text-neutral-400 font-bold tracking-[0.2em] uppercase text-[11px] flex items-center gap-1.5";
                dispatchTitle.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-neutral-400"></span> GLOBAL WEB SEARCH CORE`;
                dispatchText.innerText = `Intent path undefined. Defaulting operational parameters to external search nodes...`;
                targetUrl = `https://www.google.com/search?q=${encodeURIComponent(transcript)}`;
        }

        if (targetUrl !== "") {
            setTimeout(() => { window.location.href = targetUrl; }, 2200);
        }
    }
</script>
</body>
</html>
