<script>
    document.addEventListener('mousemove', (e) => {
        const moveX = (e.clientX - window.innerWidth / 2) / 80;
        const moveY = (e.clientY - window.innerHeight / 2) / 80;
        const panel = document.querySelector('.glass-panel');
        const bg = document.querySelector('.fixed.inset-0.z-0');
        
        if(panel) panel.style.transform = `translate(${moveX}px, ${moveY}px)`;
        if(bg) bg.style.transform = `scale(1.1) translate(${moveX * -0.5}px, ${moveY * -0.5}px)`;
    });

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    async function toggleRecording() {
        const recordBtn = document.getElementById("record-btn");
        const recordIcon = document.getElementById("record-icon");
        const recordText = document.getElementById("record-text");
        const statusPulse = document.getElementById("status-pulse");
        const statusText = document.getElementById("status");

        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    statusText.innerText = "Processing Voice Protocol via Sarvam AI...";
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await processCrisisPipeline(audioBlob);
                };

                mediaRecorder.start();
                isRecording = true;

                recordBtn.classList.add("border-red-500/50", "bg-red-900/20");
                recordIcon.innerText = "stop";
                recordIcon.className = "material-symbols-outlined text-3xl text-red-500 animate-pulse";
                recordText.innerText = "Stop";
                statusPulse.className = "w-1.5 h-1.5 rounded-full bg-red-500 animate-ping shadow-[0_0_10px_#ef4444]";
                statusText.innerText = "Intercepting local audio data streams...";
                statusText.className = "font-label-sm text-label-sm uppercase tracking-[0.2em] text-red-400";

            } catch (err) {
                console.error("Audio pipeline crash:", err);
                statusText.innerText = "CAPTURE HARDWARE MALFUNCTION";
            }
        } else {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            isRecording = false;

            recordBtn.classList.remove("border-red-500/50", "bg-red-900/20");
            recordIcon.innerText = "mic";
            recordIcon.className = "material-symbols-outlined text-3xl text-primary";
            recordText.innerText = "Record";
        }
    }

    async function processCrisisPipeline(blob) {
        const statusText = document.getElementById("status");
        const statusPulse = document.getElementById("status-pulse");
        const mainDisplay = document.getElementById("main-display-text");
        const intelMatrix = document.getElementById("intel-matrix");
        const dispatchCard = document.getElementById("dispatch-alert-card");
        const dispatchTitle = document.getElementById("dispatch-title");
        const dispatchText = document.getElementById("dispatch-action-text");

        const formData = new FormData();
        formData.append("file", blob, "live_capture.webm");

        try {
            const response = await fetch("http://127.0.0.1:5000/api/voice-incident", {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error("Flask pipeline error");

            const data = await response.json();
            const transcript = data.transcript;

            mainDisplay.innerHTML = `<span class="text-sm block tracking-widest text-primary/60 font-label-sm uppercase mb-2">TRANSCRIPT CAPTURED</span> "${transcript}"`;
            mainDisplay.classList.remove("text-[72px]");
            mainDisplay.classList.add("text-[32px]", "normal-case", "font-body-md");

            document.getElementById("readout-job").innerText = data.job_id;
            document.getElementById("readout-type").innerText = data.incident_type;
            document.getElementById("readout-sector").innerText = data.sector;
            document.getElementById("readout-resource").innerText = data.allocated_resource;
            
            intelMatrix.classList.remove("hidden");

            statusPulse.className = "w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_10px_#34d399]";
            statusText.innerText = "Neural Intention Decoded";
            statusText.className = "font-label-sm text-label-sm uppercase tracking-[0.2em] text-emerald-400";

            // 🧠 COGNITIVE SYSTEM ROUTER PAYLOAD
            const routing = data.routing;
            const appType = routing.target_app.toLowerCase();
            const params = routing.extracted_params;
            let targetUrl = "";

            dispatchCard.className = "w-full max-w-md p-4 rounded text-left font-label-sm space-y-2 mt-4 block border";
            dispatchCard.classList.remove("hidden");

            switch(appType) {
                case "amazon":

                    dispatchTitle.innerHTML = `<span class="material-symbols-outlined text-[16px]">shopping_cart</span> AMAZON SUPPLY CORE`;

                    dispatchCard.classList.add("bg-neutral-900", "border-neutral-600");
                    dispatchTitle.className = "flex items-center gap-2 text-neutral-300 font-bold tracking-wider uppercase text-[12px]";
                    dispatchTitle.innerHTML = `<span class="material-symbols-outlined text-[16px]">terminal</span> DEVOPS GITHUB INTEGRATION`;
                    dispatchText.innerText = "Loading remote infrastructure nodes inside GitHub cloud networks...";
                    targetUrl = "https://github.com";
                    break;

                default:
                    dispatchCard.classList.add("hidden");
                    targetUrl = "";
            }

            // Automatic window transition delay
            if (targetUrl !== "") {
                setTimeout(() => { window.location.href = targetUrl; }, 2200);
            }

        } catch (error) {
            console.error("Pipeline fault:", error);
            statusPulse.className = "w-1.5 h-1.5 rounded-full bg-red-500";
            statusText.innerText = "System dispatch error // 500";
        }
    }
</script>
</body>
</html>
